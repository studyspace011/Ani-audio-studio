            "MIC-4": {
                title: "MIC-4: Study of Urdu Ghazal",
                subtitle: "اردو غزل کا مطالعہ",
                tracks: [
                    { id: "1.1", title: "1.1 Urdu Ghazal: Tareef-o-Tareekh & Dabistan", src: "audio/mic-4/1.1.mp3" },
                    { id: "2.1", title: "2.1 Wali Deccani: Muflisi sab bahar khoti hai", src: "audio/mic-4/2.1.mp3" },
                    { id: "2.2", title: "2.2 Mir Taqi Mir: Nazuki us kay lab ki...", src: "audio/mic-4/2.2.mp3" },
                    { id: "3.1", title: "3.1 Atish: Sun to sahi jahan men hai...", src: "audio/mic-4/3.1.mp3" },
                    { id: "3.2", title: "3.2 Shad Azimabadi: Ab bhi ek umr pe...", src: "audio/mic-4/3.2.mp3" }
                ]
            },
            "AEC-4": {
                title: "AEC-4: Social Service & Sports",
                subtitle: "NCC, National Integration & Skill Dev",
                tracks: [
                    { id: "1.1", title: "1.1 NCC: Aims, Objectives & Camps", src: "audio/aec-4/1.1.mp3" },
                    { id: "2.1", title: "2.1 National Integration & Diversity", src: "audio/aec-4/2.1.mp3" },
                    { id: "3.1", title: "3.1 Personality Development & Skills", src: "audio/aec-4/3.1.mp3" },
                    { id: "4.1", title: "4.1 Social Service & Community Dev", src: "audio/aec-4/4.1.mp3" },
                    { id: "P.1", title: "P.1 Practical: Military Training & Drills", src: "audio/aec-4/P.1.mp3" }
                ]
            }
        };

        // App States
        let currentSectionKey = "MJC-5";
        let currentTrackIndex = 0;
        let isPlaying = false;
        let deferredPrompt;

        const audio = document.getElementById('audioEngine');

        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderNavs();
            loadSection(currentSectionKey);
            setupAudioEvents();
            restoreLastPlaybackState();
            setupPWA();
        });

        // Theme Configuration
        function initTheme() {
            const savedTheme = localStorage.getItem('ani_theme') || 'dark';
            if (savedTheme === 'light') document.documentElement.classList.remove('dark');
            else document.documentElement.classList.add('dark');
            updateThemeIcons();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('ani_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcons();
        }

        function updateThemeIcons() {
            const iconClass = document.documentElement.classList.contains('dark') ? 'fa-moon' : 'fa-sun';
            document.getElementById('themeIcon').className = `fa-solid ${iconClass}`;
            document.getElementById('themeIconMobile').className = `fa-solid ${iconClass}`;
        }

        // Navigation Renderer
        function renderNavs() {
            const desktopNav = document.getElementById('desktopNav');
            const drawerNav = document.getElementById('mobileDrawerNav');
            desktopNav.innerHTML = ''; drawerNav.innerHTML = '';

            Object.keys(syllabusData).forEach(key => {
                const isSelected = key === currentSectionKey;

                const dBtn = document.createElement('button');
                dBtn.className = `w-full text-left px-4 py-3 rounded-xl font-semibold flex items-center space-x-3 transition ${isSelected ? 'bg-spotify text-black font-bold shadow-sm' : 'text-slate-600 dark:text-neutral-400 hover:bg-slate-200 dark:hover:bg-neutral-900'}`;
                dBtn.onclick = () => loadSection(key);
                dBtn.innerHTML = `<i class="fa-solid fa-folder-closed"></i> <span>${key}</span>`;
                desktopNav.appendChild(dBtn);

                const mBtn = document.createElement('button');
                mBtn.className = `w-full text-left p-4 rounded-xl flex items-center justify-between border transition ${isSelected ? 'bg-spotify/10 border-spotify text-spotify font-bold' : 'bg-slate-50 dark:bg-neutral-800 border-slate-200 dark:border-neutral-700'}`;
                mBtn.onclick = () => { loadSection(key); closeSubjectDrawer(); };
                mBtn.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <i class="fa-solid fa-book text-spotify"></i>
                        <div>
                            <p class="text-sm font-bold text-slate-800 dark:text-white">${syllabusData[key].title}</p>
                            <p class="text-xs text-slate-500 dark:text-neutral-400">${syllabusData[key].subtitle}</p>
                        </div>
                    </div>
                    ${isSelected ? '<i class="fa-solid fa-circle-check text-spotify"></i>' : '<i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>'}
                `;
                drawerNav.appendChild(mBtn);
            });
        }

        function openSubjectDrawer() {
            document.getElementById('subjectDrawer').classList.remove('pointer-events-none');
            document.getElementById('drawerOverlay').classList.remove('opacity-0');
            document.getElementById('drawerContent').classList.remove('translate-y-full');
        }

        function closeSubjectDrawer() {
            document.getElementById('drawerOverlay').classList.add('opacity-0');
            document.getElementById('drawerContent').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('subjectDrawer').classList.add('pointer-events-none'), 350);
        }

        // Direct Cloudinary Force Download Generator
        function getDirectDownloadUrl(originalUrl, filename) {
            if (originalUrl.includes('cloudinary.com')) {
                // Attach attachment flag for direct browser file download
                const cleanFilename = filename.replace(/[^a-zA-Z0-9.-]/g, "_");
                return originalUrl.replace('/upload/', `/upload/fl_attachment:${cleanFilename}/`);
            }
            return originalUrl;
        }

        // Single Track Direct Download Execution
        function triggerSingleDownload(url, title) {
            const downloadUrl = getDirectDownloadUrl(url, `${title}.mp3`);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.setAttribute('download', `${title}.mp3`);
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Section Track List Loader
        function loadSection(key) {
            currentSectionKey = key;
            document.getElementById('mobileSubjectBtnLabel').innerText = key;
            renderNavs();

            const data = syllabusData[key];
            document.getElementById('currentPlaylistTitle').innerText = data.title;
            document.getElementById('currentPlaylistSubtitle').innerText = data.subtitle;

            const container = document.getElementById('trackListContainer');
            container.innerHTML = '';

            data.tracks.forEach((track, index) => {
                const isCurrentPlaying = (currentSectionKey === key && currentTrackIndex === index && isPlaying);
                const card = document.createElement('div');
                card.className = `track-card flex items-center justify-between p-3.5 rounded-2xl transition border ${isCurrentPlaying ? 'bg-spotify/10 border-spotify' : 'bg-white dark:bg-neutral-900 hover:bg-slate-100 dark:hover:bg-spotifyHover border-slate-200 dark:border-neutral-800'} shadow-sm`;
                
                card.innerHTML = `
                    <div class="flex items-center space-x-3.5 flex-1 pr-2 overflow-hidden cursor-pointer" onclick="playTrack(${index})">
                        <span class="w-7 text-center text-xs font-mono font-bold text-spotify">${track.id}</span>
                        <div class="overflow-hidden">
                            <p class="font-medium text-xs md:text-sm text-slate-800 dark:text-slate-100 truncate">${track.title}</p>
                            <p class="text-[10px] text-slate-500 dark:text-neutral-400">${key} Audio Note</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="playTrack(${index})" class="p-2 text-spotify transition active:scale-90">
                            <i class="fa-solid ${isCurrentPlaying ? 'fa-circle-pause' : 'fa-circle-play'} text-2xl"></i>
                        </button>
                        <button onclick="triggerSingleDownload('${track.src}', '${track.title}')" class="p-2 text-slate-400 hover:text-spotify transition active:scale-90" title="Direct Download">
                            <i class="fa-solid fa-download text-sm"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Audio Player Controls
        function playTrack(index, autoPlay = true, seekTime = 0) {
            currentTrackIndex = index;
            const track = syllabusData[currentSectionKey].tracks[index];
            
            if (audio.src !== track.src && !audio.src.endsWith(track.src)) {
                audio.src = track.src;
            }

            document.getElementById('playerTrackTitle').innerText = track.title;
            document.getElementById('playerTrackSection').innerText = syllabusData[currentSectionKey].title;

            if (seekTime > 0) audio.currentTime = seekTime;

            if (autoPlay) {
                audio.play();
                isPlaying = true;
            }
            updatePlayIcons();
            loadSection(currentSectionKey);
        }

        function togglePlay() {
            if (!audio.src) { playTrack(0); return; }
            if (isPlaying) audio.pause();
            else audio.play();
            isPlaying = !isPlaying;
            updatePlayIcons();
            loadSection(currentSectionKey);
        }

        function updatePlayIcons() {
            const icon = isPlaying ? '<i class="fa-solid fa-pause text-sm"></i>' : '<i class="fa-solid fa-play text-sm"></i>';
            document.getElementById('mainPlayBtn').innerHTML = icon;
            document.getElementById('mobilePlayBtn').innerHTML = icon;
        }

        function playNextTrack() {
            const tracks = syllabusData[currentSectionKey].tracks;
            if (currentTrackIndex < tracks.length - 1) playTrack(currentTrackIndex + 1);
        }

        function playPrevTrack() {
            if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1);
        }

        function downloadCurrentTrack() {
            const track = syllabusData[currentSectionKey].tracks[currentTrackIndex];
            if (track) triggerSingleDownload(track.src, track.title);
        }

        function setupAudioEvents() {
            const progress = document.getElementById('progressBar');

            audio.ontimeupdate = () => {
                if (audio.duration) {
                    progress.value = (audio.currentTime / audio.duration) * 100;
                    document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                    document.getElementById('totalDuration').innerText = formatTime(audio.duration);
                    savePlaybackState();
                }
            };

            progress.oninput = () => {
                audio.currentTime = (progress.value / 100) * audio.duration;
            };

            document.getElementById('volumeSlider').oninput = (e) => {
                audio.volume = e.target.value;
            };

            audio.onended = () => playNextTrack();
        }

        function savePlaybackState() {
            const state = { section: currentSectionKey, index: currentTrackIndex, time: audio.currentTime };
            localStorage.setItem('ani_last_playback', JSON.stringify(state));
        }

        function restoreLastPlaybackState() {
            const savedState = localStorage.getItem('ani_last_playback');
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (syllabusData[state.section]) {
                        currentSectionKey = state.section;
                        loadSection(currentSectionKey);
                        playTrack(state.index, false, state.time);
                    }
                } catch (e) { console.error("Restore state error", e); }
            }
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Reliable Multi-file Bulk Download via JSZip Engine
        async function downloadEntireSection() {
            const tracks = syllabusData[currentSectionKey].tracks;
            const btnText = document.getElementById('bulkDownloadBtnText');
            const btnIcon = document.getElementById('bulkDownloadIcon');
            const btn = document.getElementById('bulkDownloadBtn');

            btn.disabled = true;
            btnIcon.className = "fa-solid fa-spinner fa-spin";
            
            const zip = new JSZip();
            const folder = zip.folder(currentSectionKey);

            try {
                for (let i = 0; i < tracks.length; i++) {
                    const t = tracks[i];
                    btnText.innerText = `Preparing (${i + 1}/${tracks.length})...`;
                    const downloadUrl = getDirectDownloadUrl(t.src, `${t.title}.mp3`);
                    
                    const response = await fetch(downloadUrl);
                    const blob = await response.blob();
                    folder.file(`${t.id} - ${t.title}.mp3`, blob);
                }

                btnText.innerText = "Zipping Files...";
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, `${currentSectionKey}_All_Audios.zip`);

            } catch (err) {
                alert("Direct ZIP creation encountered an issue. Starting standard downloads.");
                tracks.forEach(t => triggerSingleDownload(t.src, t.title));
            } finally {
                btn.disabled = false;
                btnIcon.className = "fa-solid fa-cloud-arrow-down";
                btnText.innerText = "Download All Section Audios (ZIP)";
            }
        }

        // PWA App Installation Handler
        function setupPWA() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                document.getElementById('pwaBannerMobile')?.classList.remove('hidden');
                document.getElementById('pwaInstallBtnDesktop')?.classList.remove('hidden');
            });

            const triggerPrompt = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => {
                        deferredPrompt = null;
                        document.getElementById('pwaBannerMobile')?.classList.add('hidden');
                        document.getElementById('pwaInstallBtnDesktop')?.classList.add('hidden');
                    });
                } else {
                    alert("App installation ready! If prompt didn't open, tap browser menu (⋮) -> 'Add to Home screen'");
                }
            };

            document.getElementById('pwaInstallBtnMobile').onclick = triggerPrompt;
            document.getElementById('pwaInstallBtnDesktop').onclick = triggerPrompt;
            document.getElementById('pwaInstallBtnTopMobile').onclick = triggerPrompt;
        }
    </script>
</body>
</html>
